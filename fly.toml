app = "routebite"
primary_region = "mia"  # Miami is closest to your test scenario

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  USE_MOCK_ROUTING = "false"  # use OSRM public

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/health"
