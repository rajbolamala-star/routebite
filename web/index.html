<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#111827" />
    <title>RouteBite</title>
    <link rel="stylesheet" href="/web/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero-panel" aria-label="Route search">
        <div class="topbar">
          <div>
            <p class="eyebrow">RouteBite</p>
            <h1>Food on your way, without losing the route.</h1>
          </div>
          <div class="status-pill" id="apiStatus">API ready</div>
        </div>

        <div class="route-visual" aria-hidden="true">
          <div class="map-grid"></div>
          <div class="route-line"></div>
          <span class="map-pin start"></span>
          <span class="map-pin food"></span>
          <span class="map-pin end"></span>
        </div>

        <form id="searchForm" class="search-card">
          <div class="field-row">
            <label>
              <span>Origin</span>
              <input id="originInput" type="text" autocomplete="off" value="North Miami Beach" />
            </label>
            <button class="icon-button" type="button" id="swapRoute" aria-label="Swap route" title="Swap route">
              <span aria-hidden="true">⇄</span>
            </button>
            <label>
              <span>Destination</span>
              <input id="destinationInput" type="text" autocomplete="off" value="Sunrise" />
            </label>
          </div>

          <div class="preset-row" aria-label="Route presets">
            <button type="button" class="chip active" data-route="miami-sunrise">Miami to Sunrise</button>
            <button type="button" class="chip" data-route="la-santa-monica">LA to Santa Monica</button>
            <button type="button" class="chip" data-route="brooklyn-newark">Brooklyn to Newark</button>
          </div>

          <label class="voice-field">
            <span>What sounds good?</span>
            <div class="voice-input">
              <input id="voiceText" type="text" value="find me soup along the way" />
              <button class="icon-button" type="button" id="listenButton" aria-label="Speak food request" title="Speak food request">
                <span aria-hidden="true">◎</span>
              </button>
            </div>
          </label>

          <div class="control-grid">
            <label>
              <span>Max detour</span>
              <select id="maxDetour">
                <option value="5">5 minutes</option>
                <option value="10" selected>10 minutes</option>
                <option value="15">15 minutes</option>
              </select>
            </label>
            <label>
              <span>Results</span>
              <select id="maxResults">
                <option value="3">Top 3</option>
                <option value="5" selected>Top 5</option>
                <option value="8">Top 8</option>
              </select>
            </label>
            <label class="toggle-row">
              <input id="openNow" type="checkbox" checked />
              <span>Open now</span>
            </label>
          </div>

          <button class="primary-button" type="submit">
            <span>Find food</span>
            <span aria-hidden="true">→</span>
          </button>
        </form>
      </section>

      <section class="results-panel" aria-live="polite">
        <div class="summary-strip">
          <div>
            <p class="eyebrow">Drive summary</p>
            <h2 id="summaryTitle">Ready for your first search</h2>
          </div>
          <button class="icon-button" type="button" id="speakButton" aria-label="Read summary aloud" title="Read summary aloud">
            <span aria-hidden="true">▸</span>
          </button>
        </div>

        <div class="metrics">
          <div>
            <span id="baseTime">--</span>
            <small>base drive</small>
          </div>
          <div>
            <span id="distance">--</span>
            <small>distance</small>
          </div>
          <div>
            <span id="resultCount">--</span>
            <small>spots</small>
          </div>
        </div>

        <div id="emptyState" class="empty-state">
          <strong>Ask for what you want.</strong>
          <p>Try “pizza for the family,” “coffee near the route,” or “healthy lunch under 5 minutes.”</p>
        </div>

        <div id="resultsList" class="results-list"></div>
      </section>
    </main>

    <template id="resultTemplate">
      <article class="result-card">
        <div class="result-rank"></div>
        <div class="result-body">
          <div class="result-head">
            <div>
              <h3></h3>
              <p class="cuisine"></p>
            </div>
            <div class="score"></div>
          </div>
          <div class="fact-row">
            <span class="rating"></span>
            <span class="detour"></span>
            <span class="price"></span>
          </div>
          <p class="address"></p>
          <div class="actions">
            <a class="call-action" href="#">Call</a>
            <a class="nav-action" href="#" target="_blank" rel="noreferrer">Navigate</a>
          </div>
        </div>
      </article>
    </template>

    <script src="/web/app.js" defer></script>
  </body>
</html>
